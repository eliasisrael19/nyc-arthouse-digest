name: Weekly NYC Arthouse Digest

concurrency:
  group: weekly-digest-${{ github.ref }}
  cancel-in-progress: false

on:
  schedule:
    # Every 15 minutes on Mondays; guarded below to send once on the first run at or after 9 AM ET.
    - cron: "*/15 * * * 1"
  workflow_dispatch:
    inputs:
      recipients_override:
        description: "Optional comma-separated recipient list for this manual run"
        required: false
        type: string
      force_resend:
        description: "Force a resend even if a digest already sent today"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: read

jobs:
  send-digest:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      OPENAI_TIMEOUT_SECONDS: "300"
      OPENAI_MAX_RETRIES: "3"
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_SENDER: ${{ secrets.SMTP_SENDER }}
      SMTP_STARTTLS: "true"
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Guard for Monday at or after 9 AM ET
        id: guard
        shell: bash
        run: |
          DOW=$(TZ=America/New_York date +%u)
          HOUR=$(TZ=America/New_York date +%H)
          HOUR_NUM=$((10#$HOUR))
          if [[ "$DOW" != "1" || "$HOUR_NUM" -lt 9 ]]; then
            echo "Not Monday at or after 9 AM ET. Skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Monday at or after 9 AM ET. Continuing."
          echo "should_run=true" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.guard.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.guard.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set recipients for this run
        if: steps.guard.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        env:
          RECIPIENTS_OVERRIDE: ${{ inputs.recipients_override }}
          TEST_RECIPIENTS: ${{ secrets.DIGEST_RECIPIENTS_TEST }}
          PROD_RECIPIENTS: ${{ secrets.DIGEST_RECIPIENTS }}
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RECIPIENTS="$RECIPIENTS_OVERRIDE"
            if [[ -z "$RECIPIENTS" ]]; then
              RECIPIENTS="$TEST_RECIPIENTS"
              echo "Using test recipients (manual run)."
            else
              echo "Using manual recipient override."
            fi
          else
            RECIPIENTS="$PROD_RECIPIENTS"
            echo "Using production recipients (scheduled run)."
          fi
          {
            echo "DIGEST_RECIPIENTS<<EOF"
            printf '%s\n' "$RECIPIENTS"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Validate recipients for this run
        if: steps.guard.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          python - <<'PY'
          import os
          import sys

          from src.config import _parse_recipients

          try:
              recipients = _parse_recipients(os.environ.get("DIGEST_RECIPIENTS", ""))
          except ValueError:
              event_name = os.environ["GITHUB_EVENT_NAME"]
              if event_name == "workflow_dispatch":
                  source = "manual recipients_override input or DIGEST_RECIPIENTS_TEST secret"
              else:
                  source = "DIGEST_RECIPIENTS secret"
              print(
                  "::error::No valid recipient email addresses found for this run. "
                  f"Fix the {source}. Accepted formats include comma-separated emails, "
                  "display-name syntax like Name <email@example.com>, or a JSON array of emails.",
                  file=sys.stderr,
              )
              raise
          print(f"Validated {len(recipients)} recipient(s) for this run.")
          PY

      - name: Skip if digest already sent today
        id: duplicate_guard
        if: steps.guard.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE_RESEND: ${{ inputs.force_resend }}
        shell: bash
        run: |
          if [[ "$FORCE_RESEND" == "true" ]]; then
            echo "Force resend enabled."
            echo "should_send=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python - <<'PY'
          import json
          import os
          import sys
          import urllib.request
          from datetime import datetime
          from zoneinfo import ZoneInfo

          from src.workflow_guard import find_prior_successful_send_run

          owner_repo = os.environ["GITHUB_REPOSITORY"]
          run_id = os.environ["GITHUB_RUN_ID"]
          token = os.environ["GH_TOKEN"]
          timezone_name = "America/New_York"
          today_et = datetime.now(ZoneInfo(timezone_name)).date()
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def fetch_json(url: str) -> dict:
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return json.load(resp)

          payload = fetch_json(
              f"https://api.github.com/repos/{owner_repo}/actions/workflows/weekly-digest.yml/runs?status=success&per_page=100"
          )
          workflow_runs = payload.get("workflow_runs", [])
          jobs_by_run_id = {}
          for run in workflow_runs:
              candidate_run_id = str(run.get("id"))
              if candidate_run_id == run_id:
                  continue
              jobs_by_run_id[candidate_run_id] = fetch_json(
                  f"https://api.github.com/repos/{owner_repo}/actions/runs/{candidate_run_id}/jobs?per_page=100"
              )

          duplicate = find_prior_successful_send_run(
              workflow_runs,
              current_run_id=run_id,
              target_date=today_et,
              timezone_name=timezone_name,
              jobs_by_run_id=jobs_by_run_id,
          )

          out_path = os.environ["GITHUB_OUTPUT"]
          with open(out_path, "a", encoding="utf-8") as fh:
              if duplicate:
                  print(
                      f"Digest already sent today in run {duplicate['id']} ({duplicate['event']}). Skipping duplicate send.",
                      file=sys.stderr,
                  )
                  fh.write("should_send=false\n")
              else:
                  fh.write("should_send=true\n")
          PY

      - name: Log send decision
        if: steps.guard.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          if [[ "${{ steps.duplicate_guard.outputs.should_send }}" == "true" ]]; then
            echo "Proceeding with digest send because it is Monday at or after 9 AM ET and no successful send has completed yet today, or force_resend was requested."
          else
            echo "Skipping digest send because a successful digest already completed earlier today in America/New_York."
          fi

      - name: Send digest
        if: (steps.guard.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch') && steps.duplicate_guard.outputs.should_send == 'true'
        run: |
          python -m src.main --send --mode hybrid --venues metrograph lincoln-center ifc angelika-nyc village-east cinema123 film-forum
