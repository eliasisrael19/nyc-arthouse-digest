name: Weekly NYC Arthouse Digest

on:
  schedule:
    # Every 15 minutes on Mondays; guarded below to send once on the first run at or after 9 AM ET.
    - cron: "*/15 * * * 1"
  workflow_dispatch:
    inputs:
      recipients_override:
        description: "Optional comma-separated recipient list for this manual run"
        required: false
        type: string
      force_resend:
        description: "Force a resend even if a digest already sent today"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: read

jobs:
  send-digest:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      OPENAI_TIMEOUT_SECONDS: "300"
      OPENAI_MAX_RETRIES: "3"
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_SENDER: ${{ secrets.SMTP_SENDER }}
      SMTP_STARTTLS: "true"
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Guard for Monday at or after 9 AM ET
        id: guard
        shell: bash
        run: |
          DOW=$(TZ=America/New_York date +%u)
          HOUR=$(TZ=America/New_York date +%H)
          HOUR_NUM=$((10#$HOUR))
          if [[ "$DOW" != "1" || "$HOUR_NUM" -lt 9 ]]; then
            echo "Not Monday at or after 9 AM ET. Skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Monday at or after 9 AM ET. Continuing."
          echo "should_run=true" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.guard.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.guard.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set recipients for this run
        if: steps.guard.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RECIPIENTS="${{ inputs.recipients_override }}"
            if [[ -z "$RECIPIENTS" ]]; then
              RECIPIENTS="${{ secrets.DIGEST_RECIPIENTS_TEST }}"
              echo "Using test recipients (manual run)."
            else
              echo "Using manual recipient override."
            fi
          else
            RECIPIENTS="${{ secrets.DIGEST_RECIPIENTS }}"
            echo "Using production recipients (scheduled run)."
          fi
          {
            echo "DIGEST_RECIPIENTS<<EOF"
            printf '%s\n' "$RECIPIENTS"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Skip if digest already sent today
        id: duplicate_guard
        if: steps.guard.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE_RESEND: ${{ inputs.force_resend }}
        shell: bash
        run: |
          if [[ "$FORCE_RESEND" == "true" ]]; then
            echo "Force resend enabled."
            echo "should_send=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python - <<'PY'
          import json
          import os
          import sys
          import urllib.request
          from datetime import datetime
          from zoneinfo import ZoneInfo

          owner_repo = os.environ["GITHUB_REPOSITORY"]
          run_id = os.environ["GITHUB_RUN_ID"]
          token = os.environ["GH_TOKEN"]
          today_et = datetime.now(ZoneInfo("America/New_York")).date()
          url = f"https://api.github.com/repos/{owner_repo}/actions/workflows/weekly-digest.yml/runs?status=success&per_page=20"
          req = urllib.request.Request(
              url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )

          with urllib.request.urlopen(req, timeout=30) as resp:
              payload = json.load(resp)

          duplicate = None
          for run in payload.get("workflow_runs", []):
              if str(run.get("id")) == run_id:
                  continue
              if run.get("event") not in {"schedule", "workflow_dispatch"}:
                  continue
              updated_at = run.get("updated_at")
              if not updated_at:
                  continue
              dt = datetime.fromisoformat(updated_at.replace("Z", "+00:00")).astimezone(ZoneInfo("America/New_York"))
              if dt.date() == today_et:
                  duplicate = run
                  break

          out_path = os.environ["GITHUB_OUTPUT"]
          with open(out_path, "a", encoding="utf-8") as fh:
              if duplicate:
                  print(
                      f"Digest already sent today in run {duplicate['id']} ({duplicate['event']}). Skipping duplicate send.",
                      file=sys.stderr,
                  )
                  fh.write("should_send=false\n")
              else:
                  fh.write("should_send=true\n")
          PY

      - name: Log send decision
        if: steps.guard.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          if [[ "${{ steps.duplicate_guard.outputs.should_send }}" == "true" ]]; then
            echo "Proceeding with digest send because it is Monday at or after 9 AM ET and no successful send has completed yet today, or force_resend was requested."
          else
            echo "Skipping digest send because a successful digest already completed earlier today in America/New_York."
          fi

      - name: Send digest
        if: (steps.guard.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch') && steps.duplicate_guard.outputs.should_send == 'true'
        run: |
          python -m src.main --send --mode hybrid --venues metrograph lincoln-center ifc angelika-nyc village-east cinema123 film-forum
